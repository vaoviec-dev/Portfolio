<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Branding Projects | Tạ Duy Trung</title>
    <link rel="icon" type="image/png" href="../assets/img/icon/favicon_bee.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/grid.css">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    
    <link rel="stylesheet" href="../assets/css/category-style.css">
</head>

<body>
    <global-header></global-header>

    <main class="category-page">
        <div class="grid wide">
            <div class="category-page__header">
                <h1 class="category-page__title">Danh mục: <span>Branding</span></h1>
                <p class="category-page__desc">Tổng hợp giải pháp xây dựng hệ thống nhận diện cốt lõi, phát triển ngôn ngữ thiết kế logo, bộ ấn phẩm văn phòng và cẩm nang hướng dẫn quy chuẩn thương hiệu (Brand Guidelines).</p>
            </div>

            <div class="portfolio__filter">
                <a href="../index.html#portfolio" class="portfolio__filter-link"><button class="portfolio__filter-btn" data-filter="all">All</button></a>
                <a href="filter-print-packaging.html" class="portfolio__filter-link"><button class="portfolio__filter-btn" data-filter="print-packaging">Print & Packaging</button></a>
                <a href="filter-advertising.html" class="portfolio__filter-link"><button class="portfolio__filter-btn" data-filter="advertising">Marketing & Ads</button></a>
                <a href="filter-branding.html" class="portfolio__filter-link"><button class="portfolio__filter-btn portfolio__filter-btn--active" data-filter="branding">Branding</button></a>
                <a href="filter-uiux-design.html" class="portfolio__filter-link"><button class="portfolio__filter-btn" data-filter="uiux-design">UI/UX Design</button></a>
                <a href="filter-video.html" class="portfolio__filter-link"><button class="portfolio__filter-btn" data-filter="video">Video Editor</button></a>
                <a href="filter-art.html" class="portfolio__filter-link"><button class="portfolio__filter-btn" data-filter="art">Draw Art</button></a>
            </div>

            <div class="slider-container">
                <button class="slider-ctrl slider-ctrl--prev disabled" aria-label="Slide trái"><i class="fas fa-chevron-left"></i></button>

                <div class="portfolio__grid-slider js-slider">
                    <div class="slider-item">
                        <div class="portfolio__card js-lightbox-trigger" data-title="Logo Concept & Core Visual Identity" data-images="../assets/img/produces/branding_1.png,../assets/img/produces/branding_2.jpg,../assets/img/produces/branding_3.png">
                            <div class="portfolio__img-box">
                                <img src="../assets/img/produces/branding_2.jpg" alt="Logo Identity Concept" class="portfolio__img">
                            </div>
                            <div class="portfolio__info">
                                <h3 class="portfolio__project-name">Logo</h3>
                                <span class="portfolio__project-category">Thiết kế logo</span>
                            </div>
                        </div>
                    </div>

                    <div class="slider-item">
                        <div class="portfolio__card js-lightbox-trigger" data-title="Corporate Stationery & Business Card" data-images="../assets/img/produces/card_1.png,../assets/img/produces/card_2.png">
                            <div class="portfolio__img-box">
                                <img src="../assets/img/produces/card_1.png" alt="Stationery Business Card" class="portfolio__img">
                            </div>
                            <div class="portfolio__info">
                                <h3 class="portfolio__project-name">Card Visit</h3>
                                <span class="portfolio__project-category">Ấn phẩm nhận diện</span>
                            </div>
                        </div>
                    </div>
                </div>

                <button class="slider-ctrl slider-ctrl--next" aria-label="Slide phải"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
    </main>

    <div class="lightbox-modal js-lightbox-modal">
        <div class="lightbox-content">
            <button class="lightbox-close js-lightbox-close" aria-label="Đóng popup"><i class="fas fa-times"></i></button>
            
            <div class="lightbox-img-wrapper js-lightbox-drag-zone">
                <img src="" alt="Lightbox Showcase Preview" class="lightbox-img js-lightbox-img">
            </div>

            <div class="lightbox-caption js-lightbox-caption">Project Title</div>
            
            <div class="lightbox-controls-bar">
                <button class="lightbox-btn js-lightbox-prev" aria-label="Ảnh trước"><i class="fas fa-chevron-left"></i></button>
                <div class="lightbox-counter js-lightbox-counter">1 / 1</div>
                <button class="lightbox-btn js-lightbox-next" aria-label="Ảnh sau"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <global-footer></global-footer>

    <script src="../assets/js/category-script.js"></script>
    <script src="../global-component.js"></script>
</body>

</html>
